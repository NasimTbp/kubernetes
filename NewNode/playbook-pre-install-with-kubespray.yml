---
- name: Pre-install bootstrap for Kubernetes nodes
  hosts: all
  become: true
  gather_facts: false

  vars:
    # Offline APT repository address
    repo_line: "deb https://repo.acctechco.com/repository/offline-apt jammy main"

    # Local GPG key path on the Ansible control machine
    gpg_key_local_path: "/etc/apt/trusted.gpg.d/nexus-apt-repo.public.gpg"

    # Destination GPG key path on target VMs
    gpg_key_remote_path: "/etc/apt/trusted.gpg.d/nexus-apt-repo.public.gpg"

    # Load balancer IP and DNS name for Kubernetes API server
    lb_ip: "172.29.28.39"
    lb_host: "lb-apiserver.kubernetes.local"

  tasks:
    ####################################################################
    # 1. Configure offline APT repository
    ####################################################################

    # Copy the Nexus APT repository GPG key to each VM
    - name: Copy offline APT repo GPG key
      ansible.builtin.copy:
        src: "{{ gpg_key_local_path }}"
        dest: "{{ gpg_key_remote_path }}"
        owner: root
        group: root
        mode: "0644"

    # Add the offline Nexus APT repository to /etc/apt/sources.list
    - name: Ensure offline APT repository exists
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        line: "{{ repo_line }}"
        state: present
        insertafter: EOF
        backup: true

    # Refresh APT package index from the offline repository
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    ####################################################################
    # 2. Disable Splunk Forwarder if it exists
    ####################################################################

    # Check whether Splunk Forwarder service exists on the VM
    - name: Check if Splunk Forwarder service exists
      ansible.builtin.shell: |
        systemctl list-unit-files | awk '{print $1}' | grep -Fxq 'SplunkForwarder.service'
      args:
        executable: /bin/bash
      register: splunk_service_check
      changed_when: false
      failed_when: false

    # Stop Splunk Forwarder to avoid interference
    - name: Stop Splunk Forwarder service if exists
      ansible.builtin.systemd:
        name: SplunkForwarder.service
        state: stopped
      when: splunk_service_check.rc == 0
      failed_when: false

    # Disable Splunk Forwarder so it does not start after reboot
    - name: Disable Splunk Forwarder service at boot if exists
      ansible.builtin.systemd:
        name: SplunkForwarder.service
        enabled: false
      when: splunk_service_check.rc == 0
      failed_when: false

    ####################################################################
    # 3. Configure /etc/hosts for Kubernetes API load balancer
    ####################################################################

    # Add lb-apiserver.kubernetes.local entry to /etc/hosts
    - name: Ensure lb-apiserver entry exists in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^\s*\d+\.\d+\.\d+\.\d+\s+{{ lb_host }}$'
        line: "{{ lb_ip }}    {{ lb_host }}"
        state: present
        insertafter: EOF
        backup: true

    ####################################################################
    # 4. Disable UFW firewall
    ####################################################################

    # Check whether UFW is installed
    - name: Check if ufw binary exists
      ansible.builtin.stat:
        path: /usr/sbin/ufw
      register: ufw_binary

    # Disable UFW rules if UFW exists
    - name: Disable UFW if installed
      ansible.builtin.command: /usr/sbin/ufw disable
      when: ufw_binary.stat.exists
      register: ufw_disable_result
      changed_when: >
        ufw_disable_result.stdout is search("Firewall stopped") or
        ufw_disable_result.stdout is search("disabled on system startup")
      failed_when: false

    # Stop, disable, and mask UFW systemd service
    - name: Stop, disable, and mask UFW service if installed
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
        masked: true
      when: ufw_binary.stat.exists
      failed_when: false

    ####################################################################
    # 5. Configure sysctl settings required by Kubernetes
    ####################################################################

    # Fix conflicting settings in /etc/sysctl.conf
    - name: Ensure net.ipv4.ip_forward is enabled in sysctl.conf
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        regexp: '^net\.ipv4\.ip_forward='
        line: 'net.ipv4.ip_forward=1'
        state: present
        backup: true

    - name: Ensure net.ipv4.conf.all.forwarding is enabled in sysctl.conf
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        regexp: '^net\.ipv4\.conf\.all\.forwarding='
        line: 'net.ipv4.conf.all.forwarding=1'
        state: present
        backup: true

    # Fix conflicting settings in custom sysctl file if it exists
    - name: Check if custom sysctl file exists
      ansible.builtin.stat:
        path: /etc/sysctl.d/99-sysctl.conf
      register: custom_sysctl_file

    - name: Ensure net.ipv4.ip_forward is enabled in custom sysctl file
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/99-sysctl.conf
        regexp: '^net\.ipv4\.ip_forward='
        line: 'net.ipv4.ip_forward=1'
        state: present
        backup: true
      when: custom_sysctl_file.stat.exists

    - name: Ensure net.ipv4.conf.all.forwarding is enabled in custom sysctl file
      ansible.builtin.lineinfile:
        path: /etc/sysctl.d/99-sysctl.conf
        regexp: '^net\.ipv4\.conf\.all\.forwarding='
        line: 'net.ipv4.conf.all.forwarding=1'
        state: present
        backup: true
      when: custom_sysctl_file.stat.exists

    # Create Kubernetes override file
    - name: Create final sysctl override for Kubernetes
      ansible.builtin.copy:
        dest: /etc/sysctl.d/999-kubernetes.conf
        content: |
          net.ipv4.ip_forward = 1
          net.ipv4.conf.all.forwarding = 1
          net.ipv4.conf.default.forwarding = 1
          fs.inotify.max_user_instances = 8192
        owner: root
        group: root
        mode: "0644"

    # Remove old file if it exists
    - name: Remove legacy Kubernetes sysctl file
      ansible.builtin.file:
        path: /etc/sysctl.d/99-zz-kubernetes.conf
        state: absent

    - name: Reload all sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    # Force runtime forwarding default for future IPv4 interfaces
    - name: Force enable default IPv4 forwarding at runtime
      ansible.builtin.command: sysctl -w net.ipv4.conf.default.forwarding=1
      changed_when: false

    # Verify kubeadm-required IPv4 forwarding value
    - name: Verify net.ipv4.ip_forward is enabled
      ansible.builtin.command: cat /proc/sys/net/ipv4/ip_forward
      register: ip_forward_status
      changed_when: false
      failed_when: ip_forward_status.stdout.strip() != "1"

    # Verify forwarding for all current IPv4 interfaces
    - name: Verify net.ipv4.conf.all.forwarding is enabled
      ansible.builtin.command: cat /proc/sys/net/ipv4/conf/all/forwarding
      register: ip_forward_all_status
      changed_when: false
      failed_when: ip_forward_all_status.stdout.strip() != "1"

    # Verify default forwarding for future IPv4 interfaces
    - name: Verify net.ipv4.conf.default.forwarding is enabled
      ansible.builtin.command: cat /proc/sys/net/ipv4/conf/default/forwarding
      register: ip_forward_default_status
      changed_when: false
      failed_when: ip_forward_default_status.stdout.strip() != "1"
    ####################################################################
    # 6. Install required packages
    ####################################################################

    # Install packages needed by Kubernetes / Kubespray / NFS storage
    - name: Install Kubernetes dependencies
      ansible.builtin.apt:
        name:
          - cri-tools
          - kubernetes-cni
          - nfs-common
        state: present

    ####################################################################
    # 7. Enable rpcbind for NFS
    ####################################################################

    # Start and enable rpcbind; useful when NFS-based storage is used
    - name: Ensure rpcbind service is running
      ansible.builtin.service:
        name: rpcbind
        state: started
        enabled: true
      failed_when: false

    ####################################################################
    # 8. Final compact report
    ####################################################################

    # Get final UFW status for reporting
    - name: Get UFW status
      ansible.builtin.command: /usr/sbin/ufw status
      when: ufw_binary.stat.exists
      register: ufw_status
      changed_when: false
      failed_when: false

    # Print final status per VM
    - name: Print final compact status
      ansible.builtin.debug:
        msg: >-
          VM={{ inventory_hostname }}
          | UFW={{
              'NOT-INSTALLED'
              if not ufw_binary.stat.exists
              else (
                'INACTIVE'
                if 'Status: inactive' in (ufw_status.stdout | default(''))
                else 'ACTIVE'
              )
            }}
          | ip_forward={{ ip_forward_status.stdout }}
          | all.forwarding={{ ip_forward_all_status.stdout }}
          | default.forwarding={{ ip_forward_default_status.stdout }}
