# Add offline APT repo + GPG key
# Update /etc/hosts and set loadbalancer ip
# Disable UFW
# Stop/disable Splunk Forwarder safely if exists
# Install dependencies (cri-tools, kubernetes-cni)
# Install containerd 2.1.6 (binary) - optional/commented
# Verify containerd version - optional/commented
# Set Kubernetes sysctl configs including net.ipv4.ip_forward
# Install NFS client

- name: Bootstrap Kubernetes nodes (repo, hosts, ufw, containerd)
  hosts: all
  become: true
  gather_facts: false

  vars:
    # ---------- APT repo ----------
    repo_line: "deb https://repo.acctechco.com/repository/offline-apt jammy main"
    gpg_key_local_path: "/etc/apt/trusted.gpg.d/nexus-apt-repo.public.gpg"
    gpg_key_remote_path: "/etc/apt/trusted.gpg.d/nexus-apt-repo.public.gpg"

    # ---------- /etc/hosts ----------
    lb_ip: "172.x.x.x"
    lb_host: "lb-apiserver.kubernetes.local"

    # ---------- containerd ----------
    containerd_version: "2.1.6"
    containerd_tarball: "containerd-{{ containerd_version }}-linux-amd64.tar.gz"
    containerd_url: "https://repo.acctechco.com/repository/raw-hosted/containerd-2.1.6/{{ containerd_tarball }}"

  tasks:
    ####################################################################
    # APT REPOSITORY
    ####################################################################

    - name: Copy offline APT repo GPG key
      ansible.builtin.copy:
        src: "{{ gpg_key_local_path }}"
        dest: "{{ gpg_key_remote_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Ensure offline APT repository exists
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        line: "{{ repo_line }}"
        state: present
        insertafter: EOF

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    ####################################################################
    # DISABLE SPLUNK FORWARDER SAFELY
    ####################################################################

    - name: Check if Splunk Forwarder service exists
      ansible.builtin.shell: |
        systemctl list-unit-files | awk '{print $1}' | grep -Fxq 'SplunkForwarder.service'
      args:
        executable: /bin/bash
      register: splunk_service_check
      changed_when: false
      failed_when: false

    - name: Stop Splunk Forwarder service if exists
      ansible.builtin.systemd:
        name: SplunkForwarder.service
        state: stopped
      when: splunk_service_check.rc == 0
      failed_when: false

    - name: Disable Splunk Forwarder service at boot if exists
      ansible.builtin.systemd:
        name: SplunkForwarder.service
        enabled: false
      when: splunk_service_check.rc == 0
      failed_when: false

    ####################################################################
    # /etc/hosts
    ####################################################################

    - name: Ensure lb-apiserver entry exists in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^\s*\d+\.\d+\.\d+\.\d+\s+{{ lb_host }}$'
        line: "{{ lb_ip }}    {{ lb_host }}"
        state: present
        insertafter: EOF
        backup: true

    ####################################################################
    # UFW
    ####################################################################

    - name: Check if UFW command exists
      ansible.builtin.command: command -v ufw
      register: ufw_command_check
      changed_when: false
      failed_when: false

    - name: Disable UFW if installed
      ansible.builtin.command: ufw disable
      when: ufw_command_check.rc == 0
      failed_when: false

    - name: Stop and disable UFW service if installed
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      when: ufw_command_check.rc == 0
      failed_when: false

    ####################################################################
    # CONTAINERD DEPENDENCIES
    ####################################################################

    - name: Install cri-tools and kubernetes-cni
      ansible.builtin.apt:
        name:
          - cri-tools
          - kubernetes-cni
        state: present

    ####################################################################
    # CONTAINERD INSTALLATION
    # This section is kept commented because it was commented in your file.
    # Uncomment it only if you want this playbook to install containerd binary.
    ####################################################################

    # - name: Download containerd binary tarball
    #   ansible.builtin.get_url:
    #     url: "{{ containerd_url }}"
    #     dest: "/tmp/{{ containerd_tarball }}"
    #     mode: "0644"

    # - name: Extract containerd binaries to /usr/local
    #   ansible.builtin.unarchive:
    #     src: "/tmp/{{ containerd_tarball }}"
    #     dest: /usr/local
    #     remote_src: true
    #     creates: /usr/local/bin/containerd

    # - name: Verify containerd version
    #   ansible.builtin.command: /usr/local/bin/containerd --version
    #   register: containerd_version_output
    #   changed_when: false

    # - name: Show containerd version
    #   ansible.builtin.debug:
    #     msg: "{{ containerd_version_output.stdout }}"

    ####################################################################
    # SYSCTL - KUBERNETES NETWORKING + INOTIFY
    ####################################################################

    - name: Create sysctl file for Kubernetes networking and inotify
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        content: |
          net.ipv4.ip_forward = 1
          fs.inotify.max_user_instances = 1024
        owner: root
        group: root
        mode: "0644"

    - name: Apply Kubernetes sysctl file
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-kubernetes.conf
      changed_when: false

    - name: Force enable ipv4 forwarding at runtime
      ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1
      changed_when: false

    - name: Verify ipv4 forwarding is enabled
      ansible.builtin.command: cat /proc/sys/net/ipv4/ip_forward
      register: ip_forward_status
      changed_when: false
      failed_when: ip_forward_status.stdout.strip() != "1"

    - name: Show ipv4 forwarding status
      ansible.builtin.debug:
        msg: "net.ipv4.ip_forward is {{ ip_forward_status.stdout }}"

    ####################################################################
    # NFS CLIENT
    ####################################################################

    - name: Install nfs-common package
      ansible.builtin.apt:
        name: nfs-common
        state: present

    - name: Ensure rpcbind service is running
      ansible.builtin.service:
        name: rpcbind
        state: started
        enabled: true
      failed_when: false
