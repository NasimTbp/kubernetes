# chart: bitnamicharts-keycloak , targetRevision: 25.2.0
#---------------------------- Auth -------------------------------#
# this was the temporary user
# after installation and login the user changed to `admin` with the below password
auth:
  adminPassword: K8SCkeyCloak2025@)@%
  adminUser: adminuser

#---------------------------- Common -----------------------------#
common:
  global:
    imageRegistry: repo.acctechco.com:8444
    storageClass: k8s-test-nfs

#----------------------------- Extra -----------------------------#
extraEnvVars:
  - name: KC_FEATURES
    value: preview,token-exchange,admin-fine-grained-authz:v1
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_HTTP_PORT
    value: "8080"
  - name: KC_HTTPS_PORT
    value: "8443"
  # Add these for production without auto-generated certs
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"

#---------------------------- Global -----------------------------#
global:
  defaultStorageClass: k8s-test-nfs
  imageRegistry: repo.acctechco.com:8444
  security:
    allowInsecureImages: true

#---------------------------- Image ------------------------------#
image:
  registry: repo.acctechco.com:8444

#----------------------- Public Ingress --------------------------#
ingress:
  enabled: true
  hostname: keycloak-test.acctechco.com
  ingressClassName: nginx
  tls: true
  # Add annotations for SSL redirect
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # This tells nginx to use the real certificate, not the fake one
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
  extraTls:
    - hosts:
        - keycloak-test.acctechco.com
      secretName: keycloak-test-tls
#--------------------- keycloakConfigCli -------------------------#
keycloakConfigCli:
  image:
    registry: repo.acctechco.com:8444

#--------------------------- Metrics -----------------------------#
metrics:
  enabled: true
  serviceMonitor:
    enabled: true

#------------------------- PostgreSQL ----------------------------#
postgresql:
  enabled: true
  auth:
    existingSecret: secret-postgresql-auth
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: postgres-password
  primary:
    podLabels:
      istio.io/dataplane-mode: "none"
    persistence:
      enabled: true
      size: 1Gi
      storageClass: k8s-test-nfs
  backup:
    enabled: false
    cronjob:
      storage:
        size: 1Gi
        storageClass: k8s-test-nfs
      timeZone: asia/tehran
    persistence:
      size: 1Gi

#-------------------- Production configs -------------------------#
# production recommended flags (chart names change by version)
production: true
tls:
  enabled: true  # Must be true when production is true
  usePemCerts: false
  # Remove autoGenerated section entirely or set to false
  autoGenerated:
    enabled: true

#------------------------ Replication ----------------------------#
replicaCount: 3

podAnnotations:
  traffic.sidecar.istio.io/excludeOutboundPorts: "17536"
  traffic.sidecar.istio.io/excludeOutboundIPRanges: "0.0.0.0/0"
  traffic.sidecar.istio.io/includeInboundPorts: "8080"
podLabels:
  app: keycloak
  version: 25.2.0
